<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --apps: #f43f5e;
            --extensions: #8b5cf6;
            --web: #06b6d4;
            --server: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            padding: 4rem 0 3rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #6366f1 50%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin: 3rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: 100px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--accent) 0%, #f43f5e 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .filter-btn span {
            position: relative;
            z-index: 1;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            border-color: transparent;
            color: #fff;
        }

        .filter-btn.active::before {
            opacity: 1;
        }

        .filter-btn .count {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 0.15rem 0.5rem;
            border-radius: 100px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        /* Search */
        .search-container {
            max-width: 500px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Project Card */
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-color, var(--accent)), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.15);
            box-shadow:
                0 20px 40px rgba(0,0,0,0.4),
                0 0 60px var(--accent-glow);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card[data-category="apps"] { --card-color: var(--apps); }
        .project-card[data-category="extensions"] { --card-color: var(--extensions); }
        .project-card[data-category="web"] { --card-color: var(--web); }
        .project-card[data-category="server"] { --card-color: var(--server); }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--card-color, var(--accent)) 0%, rgba(99, 102, 241, 0.3) 100%);
        }

        .card-category {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            background: rgba(255,255,255,0.05);
            color: var(--card-color, var(--text-secondary));
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .card-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.25rem;
        }

        .tag {
            font-size: 0.75rem;
            padding: 0.3rem 0.65rem;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            color: var(--text-secondary);
        }

        .card-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1rem;
            background: var(--bg-secondary);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            display: none;
        }

        .no-results.show {
            display: block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 4rem 0 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .project-card:nth-child(1) { animation-delay: 0.05s; }
        .project-card:nth-child(2) { animation-delay: 0.1s; }
        .project-card:nth-child(3) { animation-delay: 0.15s; }
        .project-card:nth-child(4) { animation-delay: 0.2s; }
        .project-card:nth-child(5) { animation-delay: 0.25s; }
        .project-card:nth-child(6) { animation-delay: 0.3s; }
        .project-card:nth-child(7) { animation-delay: 0.35s; }
        .project-card:nth-child(8) { animation-delay: 0.4s; }
        .project-card:nth-child(9) { animation-delay: 0.45s; }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .stats {
                gap: 1.5rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }

        /* External links */
        .external-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .external-link {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .external-link:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .external-link svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .external-link.github:hover { border-color: #fff; }
        .external-link.vscode:hover { border-color: #007ACC; }
        .external-link.chrome:hover { border-color: #4285F4; }
    </style>
</head>

        function initApp() {
            // Update counts
            document.getElementById('count-all').textContent = projects.length;
            document.getElementById('count-apps').textContent = projects.filter(p => p.category === 'apps').length;
            document.getElementById('count-extensions').textContent = projects.filter(p => p.category === 'extensions').length;
            document.getElementById('count-web').textContent = projects.filter(p => p.category === 'web').length;
            document.getElementById('count-server').textContent = projects.filter(p => p.category === 'server').length;
            document.getElementById('total-count').textContent = projects.length;

            // Initial render
            renderProjects(projects);
        }

        // Render projects
        function renderProjects(projectsToRender) {
            const grid = document.getElementById('projects-grid');
            const noResults = document.getElementById('no-results');

            if (projectsToRender.length === 0) {
                grid.innerHTML = '';
                noResults.classList.add('show');
                return;
            }

            noResults.classList.remove('show');

            grid.innerHTML = projectsToRender.map((project, index) => `
                <div class="project-card" data-category="${project.category}" style="animation-delay: ${index * 0.05}s">
                    ${project.image ? `<img src="${project.image}" alt="${project.title}" class="card-image" onerror="this.style.display='none'">` : ''}
                    <div class="card-header">
                        <div class="card-icon">${project.icon}</div>
                        <span class="card-category">${project.category}</span>
                    </div>
                    <h3 class="card-title">${project.title}</h3>
                    <p class="card-description">${project.description}</p>
                    <div class="card-tags">
                        ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Filter logic
        let currentFilter = 'all';
        let searchQuery = '';

        function filterProjects() {
            let filtered = projects;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.category === currentFilter);
            }

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(query) ||
                    p.description.toLowerCase().includes(query) ||
                    p.tags.some(t => t.toLowerCase().includes(query))
                );
            }

            renderProjects(filtered);
        }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterProjects();
            });
        });

        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterProjects();
        });

        // Charger les projets au démarrage
        loadProjects();
    </script>
